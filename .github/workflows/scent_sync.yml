name: Scent-ID Core Autonomous System

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSOT Structure Check
        run: |
          echo "🔍 Scent-ID SSOT Validation Start"

          REQUIRED_DIRS=(
            "C_Constitution"
            "S_Standard"
            "G_Execution"
            "L_Laboratory"
            "P_Provenance"
          )

          for dir in "${REQUIRED_DIRS[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "❌ Missing: $dir"
              exit 1
            fi
          done

          echo "✅ SSOT structure valid"

      - name: Runtime Check
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Execute Core Validation
        run: |
          python --version
          echo "🚀 Scent-ID Core Pipeline Active"