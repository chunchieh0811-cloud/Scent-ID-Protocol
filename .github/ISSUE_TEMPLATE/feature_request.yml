name: Feature Request
description: Propose an improvement to protocol, automation, or governance.
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What limitation are you facing?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the desired behavior.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Why this matters for Scent-ID operations.
    validations:
      required: true

  - type: checkboxes
    id: validation
    attributes:
      label: Validation Notes
      options:
        - label: I can help test this change.
        - label: This may impact protocol or archive documents.
